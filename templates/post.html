<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — 1pstartup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:  #1d7a5f;
      --dark:   #0d1a16;
      --text:   #1a2620;
      --muted:  #5a7368;
      --gray:   #f4f7f5;
      --radius: 8px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      line-height: 1.75;
      background: #fff;
    }
    nav {
      background: var(--dark);
      padding: 0 6%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav a { color: #fff; text-decoration: none; font-size: 0.95rem; }
    nav .brand { font-weight: 600; font-size: 1rem; }
    article {
      max-width: 720px;
      margin: 60px auto;
      padding: 0 24px;
    }
    .meta {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 32px;
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .author { color: var(--muted); font-size: 0.85rem; }
    .modified { color: var(--muted); font-size: 0.8rem; font-style: italic; }
    .lang-switch a {
      color: var(--green);
      text-decoration: none;
      font-size: 0.85rem;
    }
    .lang-switch a:hover { text-decoration: underline; }
    h1 { font-size: 2rem; font-weight: 700; line-height: 1.25; margin-bottom: 16px; }
    h2 { font-size: 1.25rem; font-weight: 600; margin: 36px 0 12px; }
    h3 { font-size: 1.05rem; font-weight: 600; margin: 24px 0 8px; }
    p  { margin-bottom: 16px; }
    ul, ol { margin: 0 0 16px 24px; }
    li { margin-bottom: 4px; }
    code {
      background: var(--gray);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
      font-family: 'SF Mono', Consolas, monospace;
    }
    pre {
      background: var(--gray);
      border-radius: var(--radius);
      padding: 20px;
      overflow-x: auto;
      margin-bottom: 20px;
    }
    pre code { background: none; padding: 0; font-size: 0.87em; }
    blockquote {
      border-left: 3px solid var(--green);
      padding-left: 16px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    hr { border: none; border-top: 1px solid #e5e5e5; margin: 40px 0; }
    .table-wrap { overflow-x: auto; margin: 0 0 24px; }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.92rem;
      margin: 0 0 24px;
    }
    th, td {
      border: 1px solid #e5e5e5;
      padding: 10px 14px;
      text-align: left;
      vertical-align: top;
      line-height: 1.55;
    }
    thead th {
      background: var(--gray);
      font-weight: 600;
      color: var(--text);
    }
    tbody tr:nth-child(even) { background: #fafbfa; }
    img {
      max-width: 100%;
      height: auto;
      display: block;
      border-radius: var(--radius);
      margin: 0 auto 32px;
    }
    /* Side-by-side story images with captions */
    .story-images {
      display: flex;
      gap: 16px;
      margin: 28px 0;
    }
    .story-images figure {
      flex: 1;
      margin: 0;
    }
    .story-images img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: var(--radius);
      margin: 0;
    }
    .story-images figcaption {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 6px;
      text-align: center;
      line-height: 1.4;
    }
    /* Mobile screenshot row */
    .mobile-screenshots {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin: 32px 0;
    }
    .mobile-screenshots img {
      width: calc(33% - 12px);
      max-width: 220px;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      margin: 0;
    }
    /* Hero image — first img in article gets full-width treatment */
    article > img:first-of-type,
    article > p:first-of-type > img {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: var(--radius);
      margin-bottom: 40px;
    }
    .series-banner {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--gray);
      border-left: 3px solid var(--green);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 40px;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .series-banner img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .series-banner .series-label {
      font-weight: 600;
      color: var(--green);
      margin-bottom: 4px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .series-banner .series-title {
      font-weight: 700;
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .series-banner .series-desc {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .series-banner a { color: var(--green); text-decoration: none; }
    .series-banner a:hover { text-decoration: underline; }
    footer {
      text-align: center;
      padding: 40px 24px;
      color: var(--muted);
      font-size: 0.85rem;
      border-top: 1px solid #e5e5e5;
      margin-top: 80px;
    }
    footer a { color: var(--green); text-decoration: none; }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/">1pstartup</a>
    <a href="/blog">Blog</a>
  </nav>
  <article>
    {{seriesBanner}}
    <h1>{{title}}</h1>
    <div class="meta">
      <span>{{date}}</span>
      {{modifiedTag}}
      {{authorTag}}
      <span class="lang-switch">{{langSwitch}}</span>
    </div>
    {{content}}
  </article>
  <footer>
    <a href="/blog">← All posts</a> &nbsp;·&nbsp; <a href="/">1pstartup.com</a>
  </footer>
</body>
</html>
