<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — 1pstartup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:  #1d7a5f;
      --dark:   #0d1a16;
      --text:   #1a2620;
      --muted:  #5a7368;
      --gray:   #f4f7f5;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background: #fff;
      line-height: 1.6;
    }
    nav {
      background: var(--dark);
      padding: 0 6%;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav a { color: #fff; text-decoration: none; font-size: 0.95rem; }
    nav .brand { font-weight: 600; font-size: 1rem; }
    .hero {
      background: var(--gray);
      padding: 60px 6%;
      text-align: center;
    }
    .hero h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .hero p  { color: var(--muted); font-size: 1rem; }
    .lang-tabs {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 32px 0 0;
    }
    .lang-tabs a {
      padding: 6px 20px;
      border-radius: 99px;
      border: 1px solid var(--green);
      color: var(--green);
      text-decoration: none;
      font-size: 0.88rem;
    }
    .lang-tabs a.active {
      background: var(--green);
      color: #fff;
    }
    .posts {
      max-width: 720px;
      margin: 48px auto;
      padding: 0 24px;
    }
    .post-item {
      padding: 24px 0;
      border-bottom: 1px solid #e5e5e5;
    }
    .post-item:last-child { border-bottom: none; }
    .post-date { color: var(--muted); font-size: 0.82rem; margin-bottom: 6px; }
    .post-title a {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }
    .post-title a:hover { color: var(--green); }
    footer {
      text-align: center;
      padding: 40px 24px;
      color: var(--muted);
      font-size: 0.85rem;
      border-top: 1px solid #e5e5e5;
    }
    footer a { color: var(--green); text-decoration: none; }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/">1pstartup</a>
    <a href="/blog">Blog</a>
  </nav>
  <div class="hero">
    <h1>Blog</h1>
    <p>Vibe coding, startup ideas, engineering lessons</p>
    <div class="lang-tabs">
      <a href="/blog/en" class="{{enActive}}">English</a>
      <a href="/blog/zh" class="{{zhActive}}">中文</a>
    </div>
  </div>
  <div class="posts">
    {{posts}}
  </div>
  <footer>
    <a href="/">1pstartup.com</a>
  </footer>
</body>
</html>
