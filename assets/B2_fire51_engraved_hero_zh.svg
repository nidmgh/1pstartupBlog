<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1a"/>
      <stop offset="55%" stop-color="#0d1830"/>
      <stop offset="100%" stop-color="#111e3a"/>
    </linearGradient>
    <linearGradient id="barAI" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="barArch" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <style>
      .title  { font: 700 50px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #ffffff; }
      .sub    { font: 400 22px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #94a3b8; }
      .wk     { font: 700 18px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #60a5fa; }
      .wkbody { font: 400 17px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #cbd5e1; }
      .stat   { font: 700 96px 'Inter','Arial',sans-serif; fill: #ffffff; }
      .statU  { font: 400 24px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #94a3b8; }
      .statL  { font: 400 18px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #64748b; }
      .sh     { font: 400 18px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #cbd5e1; }
      .shh    { font: 700 20px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #ffffff; }
      .pctA   { font: 700 20px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #93c5fd; }
      .pctB   { font: 700 20px 'Inter','Arial',sans-serif; fill: #fbbf24; }
      .pctSub { font: 400 15px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #64748b; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="200" r="180" fill="#3b82f6" opacity="0.12" filter="url(#glow)"/>
  <circle cx="1420" cy="160" r="140" fill="#8b5cf6" opacity="0.14" filter="url(#glow)"/>
  <circle cx="1350" cy="820" r="200" fill="#06b6d4" opacity="0.10" filter="url(#glow)"/>

  <!-- Title -->
  <text class="title" x="80" y="88">从想法到上线，用天而非月</text>
  <text class="sub"   x="80" y="128">一位架构师。约 40 小时实际工作。一个完整的生产级全栈应用。</text>

  <!-- Divider -->
  <line x1="80" y1="152" x2="1520" y2="152" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- ───── LEFT: 4-week timeline ───── -->
  <rect x="72" y="172" width="430" height="548" rx="20"
        fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5" filter="url(#shadow)"/>

  <text x="287" y="210" text-anchor="middle" class="shh">四周弧线</text>

  <!-- W1 -->
  <rect x="96" y="228" width="382" height="110" rx="12"
        fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.30)" stroke-width="1"/>
  <text class="wk"     x="116" y="256">第 1 周</text>
  <text class="wkbody" x="116" y="280">架构文档 + 模块接口契约</text>
  <text class="wkbody" x="116" y="302">模拟引擎（纯函数）</text>
  <text class="wkbody" x="116" y="324">基础报告框架</text>

  <!-- W2 -->
  <rect x="96" y="350" width="382" height="110" rx="12"
        fill="rgba(16,185,129,0.10)" stroke="rgba(16,185,129,0.28)" stroke-width="1"/>
  <text class="wk" x="116" y="378" fill="#34d399">第 2 周</text>
  <text class="wkbody" x="116" y="402">上线 fire51.com</text>
  <text class="wkbody" x="116" y="424">安全加固</text>
  <text class="wkbody" x="116" y="446">税务引擎精度验证</text>

  <!-- W3 -->
  <rect x="96" y="472" width="382" height="110" rx="12"
        fill="rgba(139,92,246,0.10)" stroke="rgba(139,92,246,0.28)" stroke-width="1"/>
  <text class="wk" x="116" y="500" fill="#a78bfa">第 3 周</text>
  <text class="wkbody" x="116" y="524">JWT 认证 + OTP 邮件</text>
  <text class="wkbody" x="116" y="546">iOS &amp; Android 壳（Capacitor）</text>
  <text class="wkbody" x="116" y="568">服务端 PDF 生成</text>

  <!-- W4 -->
  <rect x="96" y="594" width="382" height="110" rx="12"
        fill="rgba(245,158,11,0.10)" stroke="rgba(245,158,11,0.28)" stroke-width="1"/>
  <text class="wk" x="116" y="622" fill="#fbbf24">第 4 周</text>
  <text class="wkbody" x="116" y="646">打磨 + Emoji 修复</text>
  <text class="wkbody" x="116" y="668">合并到主分支</text>
  <text class="wkbody" x="116" y="690">新 VM 部署——完成</text>

  <!-- ───── CENTER: Big stat ───── -->
  <circle cx="800" cy="400" r="120" fill="#3b82f6" opacity="0.08" filter="url(#glow)"/>

  <text class="stat" x="800" y="430" text-anchor="middle">~40</text>
  <text class="statU" x="800" y="478" text-anchor="middle">小时实际编码工作</text>
  <text class="statL" x="800" y="510" text-anchor="middle">日历上横跨四周</text>

  <!-- Connector lines -->
  <line x1="515" y1="430" x2="660" y2="430" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="940" y1="430" x2="1080" y2="430" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- ───── RIGHT: What shipped ───── -->
  <rect x="1088" y="172" width="440" height="548" rx="20"
        fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5" filter="url(#shadow)"/>

  <text x="1308" y="210" text-anchor="middle" class="shh">交付了什么</text>

  <circle cx="1112" cy="249" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="255">模拟引擎（TypeScript，纯函数）</text>

  <circle cx="1112" cy="293" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="299">JWT 认证 + OTP 邮件</text>

  <circle cx="1112" cy="337" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="343">iOS &amp; Android 壳（Capacitor）</text>

  <circle cx="1112" cy="381" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="387">带图表的交互式报告</text>

  <circle cx="1112" cy="425" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="431">PDF 导出 + CSV 下载</text>

  <circle cx="1112" cy="469" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="475">PolicyEngine 税务验证套件</text>

  <circle cx="1112" cy="513" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="519">AWS Lightsail 上的 Nginx + SSL + PM2</text>

  <circle cx="1112" cy="557" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="563">聊天式财务数据收集</text>

  <line x1="1108" y1="584" x2="1508" y2="584" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <text class="sh" x="1308" y="614" text-anchor="middle" fill="#94a3b8">不是原型。不是演示。</text>
  <text class="sh" x="1308" y="644" text-anchor="middle" fill="#94a3b8">是一个在真实域名上运行的可用应用。</text>
  <text class="sh" x="1308" y="684" text-anchor="middle" fill="#64748b">fire51.com</text>

  <!-- ───── BOTTOM: 95%/5% split bar ───── -->
  <line x1="80" y1="745" x2="1520" y2="745" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <text x="800" y="778" text-anchor="middle" class="statL">工作分工</text>

  <!-- AI bar -->
  <rect x="180" y="792" width="1083" height="36" rx="6" fill="url(#barAI)" opacity="0.85"/>
  <!-- Architect bar -->
  <rect x="1263" y="792" width="114" height="36" rx="6" fill="url(#barArch)" opacity="0.90"/>

  <text class="pctA" x="680" y="817" text-anchor="middle">AI — 约 95% 的代码行</text>
  <text class="pctB" x="1320" y="817" text-anchor="middle">5%</text>

  <text class="pctSub" x="680" y="854" text-anchor="middle">实现、重构、测试、样板代码</text>
  <text class="pctSub" x="1320" y="854" text-anchor="middle">架构师判断</text>
</svg>
