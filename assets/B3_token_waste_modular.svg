<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1a"/>
      <stop offset="55%" stop-color="#0d1830"/>
      <stop offset="100%" stop-color="#111e3a"/>
    </linearGradient>
    <radialGradient id="wasteGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cleanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="glowM" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="glowS" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" opacity="0.7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e" opacity="0.85"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" opacity="0.7"/>
    </marker>
    <style>
      .t-head { font: 700 48px 'Inter','Arial',sans-serif; fill: #ffffff; }
      .t-sub  { font: 400 22px 'Inter','Arial',sans-serif; fill: #64748b; }
      .t-panel{ font: 700 26px 'Inter','Arial',sans-serif; }
      .t-body { font: 400 18px 'Inter','Arial',sans-serif; fill: #94a3b8; }
      .t-tag  { font: 700 15px 'Inter','Arial',sans-serif; }
      .t-pct  { font: 700 56px 'Inter','Arial',sans-serif; }
      .t-pctL { font: 400 20px 'Inter','Arial',sans-serif; }
      .t-mod  { font: 700 13px 'Inter','Arial',sans-serif; fill: #94a3b8; }
      .t-rule { font: 400 16px 'Inter','Arial',sans-serif; fill: #64748b; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Panel glow orbs -->
  <ellipse cx="360" cy="480" rx="280" ry="220" fill="url(#wasteGlow)" filter="url(#glow)"/>
  <ellipse cx="1240" cy="480" rx="280" ry="220" fill="url(#cleanGlow)" filter="url(#glow)"/>

  <!-- Title -->
  <text class="t-head" x="800" y="72" text-anchor="middle">Token Waste: Monolith vs Modular</text>
  <text class="t-sub"  x="800" y="108" text-anchor="middle">How you structure work determines 90% of your AI bill</text>

  <!-- Divider -->
  <line x1="80" y1="130" x2="1520" y2="130" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Center vertical divider -->
  <line x1="800" y1="144" x2="800" y2="836" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- VS badge -->
  <circle cx="800" cy="480" r="34" fill="#0d1830" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <text x="800" y="488" text-anchor="middle"
        font-family="'Inter',sans-serif" font-size="20" font-weight="700" fill="#475569">VS</text>

  <!-- ══════ LEFT PANEL: Monolith ══════ -->
  <text class="t-panel" x="360" y="166" text-anchor="middle" fill="#f87171">The Monolith Prompt</text>

  <!-- Input tokens flowing in (top) — chaotic, many arrows -->
  <!-- Token rain: lots of small dots coming from top -->
  <g opacity="0.75">
    <!-- Token dots -->
    <circle cx="160" cy="205" r="5" fill="#ef4444"/>
    <circle cx="185" cy="218" r="4" fill="#ef4444"/>
    <circle cx="210" cy="200" r="5" fill="#ef4444"/>
    <circle cx="240" cy="215" r="4" fill="#ef4444"/>
    <circle cx="265" cy="205" r="5" fill="#ef4444"/>
    <circle cx="295" cy="220" r="4" fill="#ef4444"/>
    <circle cx="320" cy="202" r="5" fill="#ef4444"/>
    <circle cx="348" cy="218" r="4" fill="#ef4444"/>
    <circle cx="375" cy="205" r="5" fill="#ef4444"/>
    <circle cx="400" cy="215" r="4" fill="#ef4444"/>
    <circle cx="425" cy="200" r="5" fill="#ef4444"/>
    <circle cx="452" cy="218" r="4" fill="#ef4444"/>
    <circle cx="478" cy="205" r="5" fill="#ef4444"/>
    <circle cx="505" cy="212" r="4" fill="#ef4444"/>
    <circle cx="530" cy="200" r="5" fill="#ef4444"/>
    <circle cx="555" cy="218" r="4" fill="#ef4444"/>
    <!-- Arrows pointing down -->
    <line x1="200" y1="228" x2="200" y2="268" stroke="#ef4444" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowRed)"/>
    <line x1="260" y1="228" x2="260" y2="268" stroke="#ef4444" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowRed)"/>
    <line x1="320" y1="228" x2="320" y2="268" stroke="#ef4444" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowRed)"/>
    <line x1="380" y1="228" x2="380" y2="268" stroke="#ef4444" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowRed)"/>
    <line x1="440" y1="228" x2="440" y2="268" stroke="#ef4444" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowRed)"/>
    <line x1="500" y1="228" x2="500" y2="268" stroke="#ef4444" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowRed)"/>
  </g>

  <text x="360" y="198" text-anchor="middle"
        font-family="'Inter',sans-serif" font-size="14" fill="#ef4444" opacity="0.8">
    ↓ massive context load — entire codebase, all docs, all history ↓
  </text>

  <!-- The blob (complex monolith prompt) -->
  <path d="M 188 290
           Q 155 310 148 360
           Q 140 415 158 450
           Q 170 490 155 535
           Q 142 580 165 615
           Q 188 648 230 658
           Q 278 670 330 660
           Q 385 650 420 665
           Q 458 678 500 666
           Q 542 652 558 618
           Q 575 582 562 545
           Q 548 505 565 468
           Q 582 428 570 385
           Q 556 338 528 308
           Q 498 278 460 272
           Q 418 265 378 275
           Q 340 285 305 272
           Q 265 258 230 268
           Q 205 276 188 290 Z"
        fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.35)" stroke-width="2.5"/>

  <!-- Internal chaos lines (tangled) -->
  <g stroke="rgba(239,68,68,0.18)" stroke-width="1.2" fill="none">
    <path d="M 220 320 Q 350 290 480 340 Q 540 370 510 420 Q 470 460 380 440 Q 290 420 250 460 Q 210 500 240 540 Q 270 575 340 570 Q 410 563 450 590 Q 490 615 520 600"/>
    <path d="M 260 350 Q 300 380 360 350 Q 420 318 460 360 Q 500 400 470 440 Q 440 480 390 470 Q 340 460 310 490 Q 280 520 300 560 Q 320 595 370 600"/>
    <path d="M 200 430 Q 260 410 310 430 Q 360 450 400 420 Q 440 390 480 410 Q 520 430 540 470"/>
    <path d="M 230 500 Q 280 480 340 510 Q 400 540 450 510 Q 500 480 530 520 Q 550 545 540 570"/>
  </g>

  <!-- Label inside blob -->
  <text x="360" y="455" text-anchor="middle"
        font-family="'Inter',sans-serif" font-size="15" fill="#f87171" opacity="0.7">
    One complex prompt
  </text>
  <text x="360" y="476" text-anchor="middle"
        font-family="'Inter',sans-serif" font-size="13" fill="#ef4444" opacity="0.5">
    "Goldbach Conjecture"
  </text>

  <!-- Waste tokens flying out sideways -->
  <g opacity="0.55">
    <!-- Left waste -->
    <line x1="162" y1="360" x2="108" y2="330" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrowRed)"/>
    <line x1="152" y1="430" x2="94"  y2="420" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrowRed)"/>
    <line x1="160" y1="510" x2="100" y2="510" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrowRed)"/>
    <circle cx="96"  cy="330" r="5" fill="#ef4444" opacity="0.4"/>
    <circle cx="86"  cy="420" r="4" fill="#ef4444" opacity="0.35"/>
    <circle cx="92"  cy="510" r="5" fill="#ef4444" opacity="0.3"/>
    <!-- Right waste -->
    <line x1="568" y1="350" x2="628" y2="320" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrowRed)"/>
    <line x1="578" y1="430" x2="640" y2="425" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrowRed)"/>
    <line x1="570" y1="510" x2="630" y2="515" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrowRed)"/>
    <circle cx="636" cy="316" r="5" fill="#ef4444" opacity="0.4"/>
    <circle cx="648" cy="423" r="4" fill="#ef4444" opacity="0.35"/>
    <circle cx="638" cy="518" r="5" fill="#ef4444" opacity="0.3"/>
  </g>

  <!-- Output arrow (bottom) — thin, disappointing -->
  <line x1="360" y1="668" x2="360" y2="720" stroke="#ef4444" stroke-width="3" opacity="0.6" marker-end="url(#arrowRed)"/>

  <!-- Waste percentage badge -->
  <rect x="200" y="724" width="320" height="88" rx="14"
        fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.30)" stroke-width="1.5"/>
  <text class="t-pct" x="360" y="783" text-anchor="middle" fill="#f87171">~90%</text>
  <text class="t-pctL" x="360" y="806" text-anchor="middle" fill="#ef4444" opacity="0.8">tokens wasted</text>

  <!-- Bottom callout -->
  <text x="360" y="854" text-anchor="middle"
        font-family="'Inter',sans-serif" font-size="16" fill="#64748b">
    Massive context · tangled intent · AI guesses at scope
  </text>

  <!-- ══════ RIGHT PANEL: Modular ══════ -->
  <text class="t-panel" x="1240" y="166" text-anchor="middle" fill="#4ade80">Modular Design</text>

  <text x="1240" y="198" text-anchor="middle"
        font-family="'Inter',sans-serif" font-size="14" fill="#22c55e" opacity="0.8">
    ↓ 10 focused tasks — each with a clear interface ↓
  </text>

  <!-- 10 module boxes (2 columns × 5 rows) -->
  <!-- Left column: x=890, Right column: x=1060 -->
  <!-- Row spacing: y=220, 300, 380, 460, 540 -->

  <g>
    <!-- Module boxes left col -->
    <rect x="890" y="220" width="154" height="54" rx="8" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.38)" stroke-width="1.5"/>
    <text class="t-mod" x="967" y="244" text-anchor="middle">M1: Auth</text>
    <text class="t-rule" x="967" y="262" text-anchor="middle">JWT + OTP</text>

    <rect x="890" y="292" width="154" height="54" rx="8" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.38)" stroke-width="1.5"/>
    <text class="t-mod" x="967" y="316" text-anchor="middle">M2: Engine</text>
    <text class="t-rule" x="967" y="334" text-anchor="middle">Pure functions</text>

    <rect x="890" y="364" width="154" height="54" rx="8" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.38)" stroke-width="1.5"/>
    <text class="t-mod" x="967" y="388" text-anchor="middle">M3: Tax</text>
    <text class="t-rule" x="967" y="406" text-anchor="middle">Validated logic</text>

    <rect x="890" y="436" width="154" height="54" rx="8" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.38)" stroke-width="1.5"/>
    <text class="t-mod" x="967" y="460" text-anchor="middle">M4: Report</text>
    <text class="t-rule" x="967" y="478" text-anchor="middle">Charts + PDF</text>

    <rect x="890" y="508" width="154" height="54" rx="8" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.38)" stroke-width="1.5"/>
    <text class="t-mod" x="967" y="532" text-anchor="middle">M5: Mobile</text>
    <text class="t-rule" x="967" y="550" text-anchor="middle">Capacitor shell</text>

    <!-- Module boxes right col -->
    <rect x="1076" y="220" width="154" height="54" rx="8" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.32)" stroke-width="1.5"/>
    <text class="t-mod" x="1153" y="244" text-anchor="middle">M6: DB</text>
    <text class="t-rule" x="1153" y="262" text-anchor="middle">MySQL schema</text>

    <rect x="1076" y="292" width="154" height="54" rx="8" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.32)" stroke-width="1.5"/>
    <text class="t-mod" x="1153" y="316" text-anchor="middle">M7: API</text>
    <text class="t-rule" x="1153" y="334" text-anchor="middle">Express routes</text>

    <rect x="1076" y="364" width="154" height="54" rx="8" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.32)" stroke-width="1.5"/>
    <text class="t-mod" x="1153" y="388" text-anchor="middle">M8: Deploy</text>
    <text class="t-rule" x="1153" y="406" text-anchor="middle">Nginx + PM2</text>

    <rect x="1076" y="436" width="154" height="54" rx="8" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.32)" stroke-width="1.5"/>
    <text class="t-mod" x="1153" y="460" text-anchor="middle">M9: Tests</text>
    <text class="t-rule" x="1153" y="478" text-anchor="middle">PolicyEngine</text>

    <rect x="1076" y="508" width="154" height="54" rx="8" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.32)" stroke-width="1.5"/>
    <text class="t-mod" x="1153" y="532" text-anchor="middle">M10: Setup</text>
    <text class="t-rule" x="1153" y="550" text-anchor="middle">setup.sh deploy</text>
  </g>

  <!-- Focused token arrows into each module (left col) -->
  <g opacity="0.7">
    <line x1="856" y1="247" x2="888" y2="247" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="856" y1="319" x2="888" y2="319" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="856" y1="391" x2="888" y2="391" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="856" y1="463" x2="888" y2="463" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="856" y1="535" x2="888" y2="535" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <!-- Small token dots -->
    <circle cx="836" cy="247" r="5" fill="#22c55e"/>
    <circle cx="836" cy="319" r="5" fill="#22c55e"/>
    <circle cx="836" cy="391" r="5" fill="#22c55e"/>
    <circle cx="836" cy="463" r="5" fill="#22c55e"/>
    <circle cx="836" cy="535" r="5" fill="#22c55e"/>
  </g>

  <!-- Focused token arrows into each module (right col) -->
  <g opacity="0.65">
    <line x1="1244" y1="247" x2="1274" y2="247" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="1244" y1="319" x2="1274" y2="319" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="1244" y1="391" x2="1274" y2="391" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="1244" y1="463" x2="1274" y2="463" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="1244" y1="535" x2="1274" y2="535" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <circle cx="1256" cy="247" r="5" fill="#22c55e"/>
    <circle cx="1256" cy="319" r="5" fill="#22c55e"/>
    <circle cx="1256" cy="391" r="5" fill="#22c55e"/>
    <circle cx="1256" cy="463" r="5" fill="#22c55e"/>
    <circle cx="1256" cy="535" r="5" fill="#22c55e"/>
  </g>

  <!-- Clean output line from all modules converging down -->
  <!-- Convergence lines from each module to center bottom -->
  <g stroke="rgba(34,197,94,0.30)" stroke-width="1.5" fill="none">
    <line x1="967" y1="562" x2="967" y2="610"/>
    <line x1="1153" y1="562" x2="1153" y2="610"/>
    <line x1="967" y1="610" x2="1060" y2="650"/>
    <line x1="1153" y1="610" x2="1060" y2="650"/>
  </g>

  <!-- Output arrow -->
  <line x1="1060" y1="650" x2="1060" y2="718" stroke="#22c55e" stroke-width="4" opacity="0.7" marker-end="url(#arrowGreen)"/>

  <!-- Efficiency badge -->
  <rect x="900" y="724" width="320" height="88" rx="14"
        fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.28)" stroke-width="1.5"/>
  <text class="t-pct" x="1060" y="783" text-anchor="middle" fill="#4ade80">~90%</text>
  <text class="t-pctL" x="1060" y="806" text-anchor="middle" fill="#22c55e" opacity="0.85">tokens useful</text>

  <!-- Bottom callout -->
  <text x="1240" y="854" text-anchor="middle"
        font-family="'Inter',sans-serif" font-size="16" fill="#64748b">
    10 focused tasks · clear interfaces · AI knows exactly what to do
  </text>

  <!-- Bottom rule -->
  <line x1="80" y1="836" x2="1520" y2="836" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
</svg>
