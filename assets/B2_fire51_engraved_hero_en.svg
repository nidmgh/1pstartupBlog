<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1a"/>
      <stop offset="55%" stop-color="#0d1830"/>
      <stop offset="100%" stop-color="#111e3a"/>
    </linearGradient>
    <linearGradient id="barAI" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="barArch" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="glowS" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <style>
      .title  { font: 700 52px 'Inter','Arial',sans-serif; fill: #ffffff; }
      .sub    { font: 400 24px 'Inter','Arial',sans-serif; fill: #94a3b8; }
      .wk     { font: 700 18px 'Inter','Arial',sans-serif; fill: #60a5fa; }
      .wkbody { font: 400 17px 'Inter','Arial',sans-serif; fill: #cbd5e1; }
      .stat   { font: 700 96px 'Inter','Arial',sans-serif; fill: #ffffff; }
      .statU  { font: 400 28px 'Inter','Arial',sans-serif; fill: #94a3b8; }
      .statL  { font: 400 20px 'Inter','Arial',sans-serif; fill: #64748b; }
      .sh     { font: 400 19px 'Inter','Arial',sans-serif; fill: #cbd5e1; }
      .shh    { font: 700 20px 'Inter','Arial',sans-serif; fill: #ffffff; }
      .pctA   { font: 700 22px 'Inter','Arial',sans-serif; fill: #93c5fd; }
      .pctB   { font: 700 22px 'Inter','Arial',sans-serif; fill: #fbbf24; }
      .pctSub { font: 400 16px 'Inter','Arial',sans-serif; fill: #64748b; }
      .tick   { stroke: rgba(255,255,255,0.18); stroke-width:1.5; fill:none; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Glow orbs -->
  <circle cx="200" cy="200" r="180" fill="#3b82f6" opacity="0.12" filter="url(#glow)"/>
  <circle cx="1420" cy="160" r="140" fill="#8b5cf6" opacity="0.14" filter="url(#glow)"/>
  <circle cx="1350" cy="820" r="200" fill="#06b6d4" opacity="0.10" filter="url(#glow)"/>

  <!-- Title -->
  <text class="title" x="80" y="88">From Idea to Production in Days, Not Months</text>
  <text class="sub"   x="80" y="128">One architect. ~40 hours of real work. A complete production app.</text>

  <!-- Divider -->
  <line x1="80" y1="152" x2="1520" y2="152" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- ───── LEFT: 4-week timeline ───── -->
  <rect x="72" y="172" width="430" height="548" rx="20"
        fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5" filter="url(#shadow)"/>

  <text x="287" y="210" text-anchor="middle" class="shh">The Four-Week Arc</text>

  <!-- Week rows -->
  <!-- W1 -->
  <rect x="96" y="228" width="382" height="110" rx="12"
        fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.30)" stroke-width="1"/>
  <text class="wk"     x="116" y="256">Week 1</text>
  <text class="wkbody" x="116" y="280">Architecture docs + module contracts</text>
  <text class="wkbody" x="116" y="302">Simulation engine (pure functions)</text>
  <text class="wkbody" x="116" y="324">Basic report scaffolding</text>

  <!-- W2 -->
  <rect x="96" y="350" width="382" height="110" rx="12"
        fill="rgba(16,185,129,0.10)" stroke="rgba(16,185,129,0.28)" stroke-width="1"/>
  <text class="wk" x="116" y="378" fill="#34d399">Week 2</text>
  <text class="wkbody" x="116" y="402">Live at fire51.com</text>
  <text class="wkbody" x="116" y="424">Security hardening</text>
  <text class="wkbody" x="116" y="446">Tax engine accuracy validated</text>

  <!-- W3 -->
  <rect x="96" y="472" width="382" height="110" rx="12"
        fill="rgba(139,92,246,0.10)" stroke="rgba(139,92,246,0.28)" stroke-width="1"/>
  <text class="wk" x="116" y="500" fill="#a78bfa">Week 3</text>
  <text class="wkbody" x="116" y="524">JWT auth + OTP email</text>
  <text class="wkbody" x="116" y="546">iOS &amp; Android shell (Capacitor)</text>
  <text class="wkbody" x="116" y="568">Server-side PDF generation</text>

  <!-- W4 -->
  <rect x="96" y="594" width="382" height="110" rx="12"
        fill="rgba(245,158,11,0.10)" stroke="rgba(245,158,11,0.28)" stroke-width="1"/>
  <text class="wk" x="116" y="622" fill="#fbbf24">Week 4</text>
  <text class="wkbody" x="116" y="646">Polish + emoji fixes</text>
  <text class="wkbody" x="116" y="668">Merge to main</text>
  <text class="wkbody" x="116" y="690">New VM deploy — done</text>

  <!-- ───── CENTER: Big stat ───── -->
  <!-- Glow behind the number -->
  <circle cx="800" cy="400" r="120" fill="#3b82f6" opacity="0.08" filter="url(#glow)"/>

  <text class="stat" x="800" y="430" text-anchor="middle">~40</text>
  <text class="statU" x="800" y="478" text-anchor="middle">hours of actual coding work</text>
  <text class="statL" x="800" y="510" text-anchor="middle">spread across 4 calendar weeks</text>

  <!-- Connector lines -->
  <line x1="515" y1="430" x2="660" y2="430" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="940" y1="430" x2="1080" y2="430" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- ───── RIGHT: What shipped ───── -->
  <rect x="1088" y="172" width="440" height="548" rx="20"
        fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" stroke-width="1.5" filter="url(#shadow)"/>

  <text x="1308" y="210" text-anchor="middle" class="shh">What Shipped</text>

  <!-- Shipped items -->
  <circle cx="1112" cy="249" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="255">Simulation engine (TypeScript, pure functions)</text>

  <circle cx="1112" cy="293" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="299">JWT auth with OTP email</text>

  <circle cx="1112" cy="337" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="343">iOS &amp; Android shell (Capacitor)</text>

  <circle cx="1112" cy="381" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="387">Interactive report + charts</text>

  <circle cx="1112" cy="425" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="431">PDF export + CSV download</text>

  <circle cx="1112" cy="469" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="475">PolicyEngine tax validation suite</text>

  <circle cx="1112" cy="513" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="519">Nginx + SSL + PM2 on AWS Lightsail</text>

  <circle cx="1112" cy="557" r="5" fill="#34d399"/>
  <text class="sh" x="1128" y="563">Chat-driven financial data collection</text>

  <line x1="1108" y1="584" x2="1508" y2="584" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <text class="sh" x="1308" y="614" text-anchor="middle" fill="#94a3b8">Not a prototype. A production app.</text>
  <text class="sh" x="1308" y="640" text-anchor="middle" fill="#94a3b8">Real domain. Real users. Real security.</text>
  <text class="sh" x="1308" y="680" text-anchor="middle" fill="#64748b">fire51.com</text>

  <!-- ───── BOTTOM: 95%/5% split bar ───── -->
  <line x1="80" y1="745" x2="1520" y2="745" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <text x="800" y="778" text-anchor="middle" class="statL">How the work split</text>

  <!-- AI bar -->
  <rect x="180" y="792" width="1083" height="36" rx="6" fill="url(#barAI)" opacity="0.85"/>
  <!-- Architect bar -->
  <rect x="1263" y="792" width="114" height="36" rx="6" fill="url(#barArch)" opacity="0.90"/>

  <text class="pctA" x="680" y="817" text-anchor="middle">AI — ~95% of lines written</text>
  <text class="pctB" x="1320" y="817" text-anchor="middle">5%</text>

  <text class="pctSub" x="680" y="854" text-anchor="middle">implementation, refactoring, tests, boilerplate</text>
  <text class="pctSub" x="1320" y="854" text-anchor="middle">architect judgment</text>
</svg>
